version: 2
updates:
  # Single root npm entry covers every workspace (apps/web, apps/mobile,
  # packages/core, packages/supabase, packages/ui). This repo uses npm
  # workspaces with a single root package-lock.json and no per-workspace
  # lockfiles, so dependabot's npm-workspaces support updates every
  # workspace's package.json and keeps the root lockfile in sync from
  # one entry here.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # GitHub Actions used in .github/workflows/ci.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
