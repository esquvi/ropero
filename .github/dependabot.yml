version: 2
updates:
  # Root workspace covers apps/web, packages/core, packages/supabase, packages/ui
  # (npm workspaces are resolved from the root package.json).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # apps/mobile has its own node_modules because Expo does not play well
  # with hoisted workspace dependencies, so dependabot needs a second entry.
  - package-ecosystem: npm
    directory: /apps/mobile
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - mobile
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # GitHub Actions used in .github/workflows/ci.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
