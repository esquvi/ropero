name: Weekly hygiene check

on:
  schedule:
    # Sundays at 12:00 UTC. Output lands in the Actions tab summary; grep
    # the "Weekly hygiene check" workflow there if something drifted.
    - cron: '0 12 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history so we can inspect commits and the session-log
          # directory's modification times.
          fetch-depth: 0

      - name: Orphan remote branches (no open PR, not main)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "### Orphan remote branches" >> "$GITHUB_STEP_SUMMARY"

          open_pr_branches=$(gh pr list --state open --json headRefName --jq '.[].headRefName' | sort -u)
          remote_branches=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin \
            | sed 's|^origin/||' \
            | grep -v '^HEAD$' \
            | grep -v '^main$' \
            | grep -v '^dependabot/' \
            || true)

          orphans=""
          while IFS= read -r branch; do
            [ -z "$branch" ] && continue
            if ! grep -qx "$branch" <<< "$open_pr_branches"; then
              age=$(git log -1 --format='%cr' "origin/$branch" 2>/dev/null || echo "unknown age")
              orphans+="- \`$branch\` (last commit $age)"$'\n'
            fi
          done <<< "$remote_branches"

          if [ -z "$orphans" ]; then
            echo "None. Remote is clean." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "These remote branches have no open PR and aren't \`main\`. Delete them or open a PR." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            printf '%s' "$orphans" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commits on main vs session log coverage (last 14 days)
        run: |
          set -euo pipefail
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Session log coverage" >> "$GITHUB_STEP_SUMMARY"

          # Use git log (not find -mtime) because the runner rewrites file
          # mtimes on checkout. git history is the source of truth for
          # "when was this file actually touched."
          cutoff=$(date -u -d '14 days ago' +%Y-%m-%d)
          commit_count=$(git log --since="$cutoff" --oneline main -- . | wc -l | tr -d ' ')
          session_commit_count=$(git log --since="$cutoff" --oneline main -- docs/sessions | wc -l | tr -d ' ')

          echo "- Commits on main in last 14 days: **$commit_count**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Of those, touching docs/sessions/: **$session_commit_count**" >> "$GITHUB_STEP_SUMMARY"

          if [ "$commit_count" -gt 0 ] && [ "$session_commit_count" -eq 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo ":warning: Commits landed on main but no session log was updated in the same window. Either the session log is stale, or commits landed outside a session. Investigate." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: KNOWN-ISSUES age distribution
        run: |
          set -euo pipefail
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### KNOWN-ISSUES age distribution" >> "$GITHUB_STEP_SUMMARY"

          tags=$(grep -oE '\[[A-Z]+-[0-9]{4}-[0-9]{2}-[0-9]{2}\]' KNOWN-ISSUES.md | sort | uniq -c | sort -rn || true)

          if [ -z "$tags" ]; then
            echo "No dated tags found." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Dated tag counts (older tags are candidates for triage):" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$tags" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Summary footer
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "_Generated by .github/workflows/hygiene-check.yml. Edit that file to adjust checks; resolve findings or document deliberate deferrals in KNOWN-ISSUES.md._" >> "$GITHUB_STEP_SUMMARY"
